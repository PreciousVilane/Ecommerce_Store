{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Set a New Password</h2>
    <form method="post">
        {% csrf_token %}
        <label for="id_new_password1">New Password:</label><br>
        {{ form.new_password1 }}<br><br>

        <label for="id_new_password2">Confirm Password:</label><br>
        {{ form.new_password2 }}<br><br>

        <button type="submit" class="btn">Change Password</button>
    </form>
</div>

<style>
.form-container {
    background: #fff;
    padding: 25px;
    max-width: 400px;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.form-container h2 {
    color: #333;
}
label {
    font-weight: bold;
}
.btn {
    background-color: #333;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 4px;
    cursor: pointer;
}
.btn:hover {
    background-color: #555;
}
</style>
{% endblock %}
