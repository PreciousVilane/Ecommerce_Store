{% extends "base.html" %}

{% block title %}Register | Vendors Ecommerce Store{% endblock %}

{% block content %}

<h1 style="text-align:center; margin-bottom: 30px;">Register</h1>

<div class="product-card" style="max-width: 400px; margin: 0 auto; padding: 30px; text-align: left;">

    {% if messages %}
        {% for message in messages %}
            <div style="
                padding: 10px;
                margin-bottom: 15px;
                border-radius: 6px;
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            ">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div style="margin-bottom: 15px;">
            <label for="id_username"><strong>Username</strong></label>
            <input id="id_username" type="text" name="username" required
                   style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="id_email"><strong>Email</strong></label>
            <input id="id_email" type="email" name="email" required
                   style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="id_password1"><strong>Password</strong></label>
            <input id="id_password1" type="password" name="password1" required
                   style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
        </div>

        <div style="margin-bottom: 15px;">
            <label for="id_password2"><strong>Confirm Password</strong></label>
            <input id="id_password2" type="password" name="password2" required
                   style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="id_role"><strong>Register as</strong></label>
            <select id="id_role" name="role" style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">
                <option value="vendor">Vendor</option>
                <option value="buyer">Buyer</option>
            </select>
        </div>

        <button type="submit" style="
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        ">
            Register
        </button>

    </form>

    <p style="margin-top: 15px; text-align:center;">
        Already have an account? <a href="{% url 'login' %}">Login</a>
    </p>
</div>

{% endblock %}
