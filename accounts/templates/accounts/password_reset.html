{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Reset Your Password</h2>
    <p>Enter your email address, and we will send you a link to reset your password.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}  <!-- Renders the email input properly -->
        <button type="submit" class="btn">Send Reset Email</button>
    </form>
</div>

<style>
.form-container {
    background: #fff;
    padding: 25px;
    max-width: 400px;
    margin: 20px auto;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.form-container h2 {
    margin-bottom: 15px;
    color: #333;
}
.form-container label {
    font-weight: bold;
}
.btn {
    background-color: #333;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 4px;
    cursor: pointer;
}
.btn:hover {
    background-color: #555;
}
</style>
{% endblock %}
